palette_hints:
  - "#000000 + #ffffff + #cc3333"
  - "#000000 + #ffcc00 + #333366"
  - "#005397 + #3399ff + #ffffff"
  - "#01784e + #7ba35a + #a67843"
  - "#660000 + #cc3333 + #e25c27"
  - "#333366 + #6b5294 + #96a1a8"
  - "#000000 + #96a1a8 + #ffffff"

embroidery_styles:
  - "front-center satin stitch emblem"
  - "flat direct front embroidery"
  - "fill-stitch geometric icon"
  - "thick running stitch outline + fill"
  - "clean centered emblem with chunky silhouette"

drops:
  - name: "Analog Era"
    slug: "analog-era"
    limited: 500
    vibe: "audio-video relic symbol world"
    embroidery_focus: "single strong center emblem"
    motifs:
      - "cassette icon with bold tape windows and center label"
      - "battery icon in low-charge state with thick bars"
      - "rewind command emblem with double-triangle glyph and thick ring border"
      - "VHS vault seal: cassette window icon inside shield frame"
      - "tape rescue club emblem with compact cassette + bold repair cross"
      - "CRT service label emblem with chunky screen icon and side knobs"
      - "floppy archive stamp with 3.5 disk silhouette in circular seal"
      - "weekend rental crest: tape stack icon framed in retro rectangle"
      - "record-ready symbol system: dot + pause + rewind in one emblem"
      - "analog frequency mark: thick waveform inside hard-edged crest"

  - name: "Playground Core"
    slug: "playground-core"
    limited: 500
    vibe: "recess icon world with playful grit"
    embroidery_focus: "bold direct-embroidery silhouette with simple mascot icon"
    motifs:
      - "snack cup icon with simple straw and chunky silhouette"
      - "club stamp icon with starburst center and heavy ring"
      - "recess champion emblem with whistle icon and thick laurel frame"
      - "hopscotch club emblem: stacked numbered blocks simplified to bold tiles"
      - "after-school fuel emblem with lunch tray icon + sunburst border"
      - "play-league crest: jump rope loop wrapped around center star"
      - "notebook doodle shield with smile lightning mascot icon"
      - "playground patrol symbol: slide silhouette inside circle"
      - "chalk squad label with chunky chalk stick bundle and frame"
      - "backpack crew emblem with zipper icon and heavy stitched border"

