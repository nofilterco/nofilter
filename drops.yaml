collection: 90s_Nostalgia_Hat_Drops
version: v3

safe_phrases:
  - "NO FILTER"
  - "OFFLINE MODE"
  - "NO WIFI ZONE"
  - "LOADING..."
  - "BUFFERING..."
  - "ANALOG ERA"
  - "RECESS FOREVER"
  - "STAY ANALOG"
  - "SIGNAL LOST"
  - "SAVED LOCALLY"
  - "SYSTEM BUSY"
  - "MALL KID"
  - "AFTER SCHOOL"
  - "DO NOT DISTURB"
  - "Y2K CLUB"

palette_hints:
  - "#000000 + #ffffff + #cc3333"
  - "#000000 + #ffcc00 + #333366"
  - "#005397 + #3399ff + #ffffff"
  - "#01784e + #7ba35a + #a67843"
  - "#660000 + #cc3333 + #e25c27"
  - "#333366 + #6b5294 + #96a1a8"
  - "#000000 + #96a1a8 + #ffffff"

embroidery_styles:
  - "front-center satin stitch emblem"
  - "puff border + flat fill"
  - "flat fill patch style"
  - "thick running stitch outline + fill"
  - "vintage badge fill with chunky border"

drops:
  - name: "Analog Era"
    slug: "analog-era"
    limited: 500
    vibe: "audio-video relic insignia world"
    embroidery_focus: "single strong center emblem"
    motifs:
      - "rewind command badge with double-triangle glyph and thick ring border"
      - "VHS vault seal: cassette window icon inside shield frame"
      - "tape rescue club patch with compact cassette + bold repair cross"
      - "CRT service label emblem with chunky screen icon and side knobs"
      - "floppy archive stamp with 3.5 disk silhouette in circular seal"
      - "weekend rental crest: tape stack icon framed in retro rectangle"
      - "record-ready symbol system: dot + pause + rewind in one badge"
      - "analog frequency mark: thick waveform inside hard-edged crest"

  - name: "Playground Core"
    slug: "playground-core"
    limited: 500
    vibe: "recess merit-badge world with playful grit"
    embroidery_focus: "bold patch silhouette with simple mascot icon"
    motifs:
      - "recess champion badge with whistle icon and thick laurel frame"
      - "hopscotch club patch: stacked numbered blocks simplified to bold tiles"
      - "after-school fuel emblem with lunch tray icon + sunburst border"
      - "sticker-league crest: jump rope loop wrapped around center star"
      - "notebook doodle shield with smile lightning mascot icon"
      - "playground patrol symbol: slide silhouette inside circular patch"
      - "chalk squad label with chunky chalk stick bundle and frame"
      - "backpack crew patch with zipper icon and heavy stitched border"

  - name: "Early Internet"
    slug: "early-internet"
    limited: 500
    vibe: "dial-up utility icon world and glitch-office humor"
    embroidery_focus: "compact center icon system, thick UI blocks"
    motifs:
      - "connection lost emblem: signal bars crossed inside octagon badge"
      - "buffer badge with segmented loading bar and heavy frame"
      - "error window patch: simplified pop-up box with alert symbol"
      - "cursor command seal: oversized pointer in circular ring"
      - "modem tone mark: bold waveform stack in shield frame"
      - "inbox offline label with envelope glyph + lock icon"
      - "system reboot crest with power icon and arrow loop"
      - "web portal badge with chunky globe grid and frame"

  - name: "Mall Culture"
    slug: "mall-culture"
    limited: 400
    vibe: "food-court and arcade token mini-brand world"
    embroidery_focus: "puff-friendly badge/coin silhouettes"
    motifs:
      - "food court club patch with tray icon in rounded rectangle"
      - "arcade token seal with center star and thick coin rim"
      - "open late insignia with ticket-stub frame and block type"
      - "mall directory symbol: wayfinding arrow stack in square emblem"
      - "neon court crest with pretzel/snack icon and spark corners"
      - "roller rink night badge with disco swirl in circular patch"
      - "weekend allowance emblem: coin stack icon + shield border"
      - "parking lot meetup label with simple car-top silhouette"

  - name: "After School TV"
    slug: "after-school-tv"
    limited: 400
    vibe: "living-room channel surf badge world"
    embroidery_focus: "centered framed icon with minimal text"
    motifs:
      - "channel surf crest: CRT icon with rabbit-ear antenna"
      - "please rewind service badge with tape arrow symbol"
      - "couch camp patch: sofa silhouette in rounded shield"
      - "snack break emblem with popcorn bucket icon and border ring"
      - "remote command label with chunky button grid"
      - "guide grid insignia with 3x3 block schedule icon"
      - "after-school signal patch with antenna + wave bars"
      - "tv stand archive badge with stacked tape silhouette"

  - name: "Y2K Minimal"
    slug: "y2k-minimal"
    limited: 350
    vibe: "future-club utility symbol world"
    embroidery_focus: "clean center mark, thick geometric strokes"
    motifs:
      - "future club oval emblem with starburst center"
      - "disc orbit badge: CD circle + motion arc in hard frame"
      - "flip-call crest with phone silhouette and signal bars"
      - "pixel flame symbol inside capsule label"
      - "chrome-era monogram block using two bold letters only"
      - "spark core insignia: 4-point sparkle in shield border"
      - "sync loop patch with dual arrows and center dot"
      - "night mode tag with crescent + grid bar icon"
