    - bold_single_line
    - stacked_two_line
    - club_mark
    - service_mark
    - icon_left
    - icon_above

palette_hints:
  - "navy_cream"
  - "forest_cream"
  - "black_gold"
  - "tan_brown"
  - "red_white"
  - "maroon_gold"

