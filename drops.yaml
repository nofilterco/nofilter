collection: 90s_Nostalgia_Hat_Drops
version: v4

safe_phrases:
  - "PROBABLY BUFFERING"
  - "OFFLINE TODAY"
  - "ANALOG HEART"
  - "LATE FEES DEPT"
  - "AFTER SCHOOL CLUB"
  - "LOW BATTERY CLUB"
  - "REWIND SERVICE"
  - "USER BUSY"
  - "CACHE MISS"
  - "DO NOT DISTURB"
  - "TOUCH GRASS LATER"
  - "SEEN ONLINE"
  - "SOFT REBOOT"
  - "RENTAL COPY"

merch_system:
  design_mix:
    text_first: 80
    text_with_accent: 15
    icon_only: 5
  palette_families:
    cream_green_red: ["#ffffff", "#01784e", "#cc3333"]
    navy_cream: ["#333366", "#ffffff", "#96a1a8"]
    black_cream: ["#000000", "#ffffff", "#a67843"]
    tan_brown_red: ["#a67843", "#660000", "#e25c27"]
    white_red_blue: ["#ffffff", "#cc3333", "#005397"]
    forest_cream: ["#01784e", "#ffffff", "#7ba35a"]
    slate_cream: ["#96a1a8", "#ffffff", "#333366"]
    maroon_gold: ["#660000", "#ffcc00", "#a67843"]
    vintage_blue_cream: ["#005397", "#3399ff", "#ffffff"]
  composition_templates:
    - bold_single_line
    - stacked_two_line
    - small_caps_service_mark
    - faux_department_lockup
    - varsity_wordmark
    - retro_tech_wordmark
    - icon_accent_left
    - icon_accent_top
    - monogram_subtitle
    - club_mark

palette_hints:
  - "cream_green_red"
  - "navy_cream"
  - "black_cream"
  - "tan_brown_red"
  - "white_red_blue"
  - "forest_cream"
  - "slate_cream"
  - "maroon_gold"
  - "vintage_blue_cream"

embroidery_styles:
  - "front-center satin stitch emblem"
  - "flat direct front embroidery"
  - "fill-stitch geometric icon"
  - "thick running stitch outline + fill"
  - "clean centered emblem with chunky silhouette"

drops:
  - name: "Analog Era"
    slug: "analog-era"
    limited: 500
    vibe: "audio-video relic symbol world"
    embroidery_focus: "single strong center emblem"
    motifs:
      - "cassette accent mark"
      - "rewind service lockup"
      - "CRT support badge"
      - "floppy archive icon"

  - name: "Playground Core"
    slug: "playground-core"
    limited: 500
    vibe: "recess icon world with playful grit"
    embroidery_focus: "bold direct-embroidery silhouette"
    motifs:
      - "after school club lockup"
      - "snack break service mark"
      - "locker energy wordmark"

  - name: "Early Internet"
    slug: "early-internet"
    limited: 500
    vibe: "dial-up utility icon world"
    embroidery_focus: "compact center icon system"
    motifs:
      - "loading bar accent"
      - "cursor status mark"
      - "connection lost lockup"

  - name: "Mall Culture"
    slug: "mall-culture"
    limited: 400
    vibe: "food-court and arcade token world"
    embroidery_focus: "puff-friendly coin/icon silhouettes"
    motifs:
      - "mall certified wordmark"
      - "food court VIP lockup"
      - "arcade token accent"

  - name: "After School TV"
    slug: "after-school-tv"
    limited: 400
    vibe: "living-room channel surf world"
    embroidery_focus: "centered framed icon with minimal text"
    motifs:
      - "weekend rental mark"
      - "rewind service label"
      - "snack break crest"

  - name: "Y2K Minimal"
    slug: "y2k-minimal"
    limited: 350
    vibe: "future-club utility symbol world"
    embroidery_focus: "clean center mark, thick strokes"
    motifs:
