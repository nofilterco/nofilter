collection: 90s_Nostalgia_Hat_Drops
version: v7

safe_phrases:
  - "PROBABLY BUFFERING"
  - "OFFLINE TODAY"
  - "ANALOG HEART"
  - "LATE FEES DEPT"
  - "AFTER SCHOOL CLUB"
  - "LOW BATTERY CLUB"
  - "REWIND SERVICE"
  - "USER BUSY"
