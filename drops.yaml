    forest_cream: ["#1e4a38", "#f2ebd9", "#9dad7f"]
    black_gold: ["#171717", "#f2e7c9", "#c8a541"]
    tan_brown: ["#ab835a", "#513821", "#e2c8a0"]
    red_white: ["#b3202e", "#f7f3ee", "#18264f"]
    maroon_gold: ["#65172b", "#efdfb4", "#b59245"]
