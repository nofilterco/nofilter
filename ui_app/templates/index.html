<!doctype html><html><head><meta charset="utf-8"><title>Crafted Occasion Dashboard</title>
<style>body{font-family:Arial;max-width:1200px;margin:20px auto}button{margin:4px;padding:8px}table{width:100%;font-size:12px}td,th{border-bottom:1px solid #ddd;padding:6px;text-align:left}.wrap{max-height:420px;overflow:auto}</style></head>
<body>
<h1>Crafted Occasion Catalog Operations Dashboard</h1>
<p>Seed launch listings, build placeholders, review, publish, and export report.</p>
<div>
<select id="collection"><option value="">All collections</option><option>family-milestones</option><option>family-reunion</option><option>wedding-bridal</option><option>bridal-party</option></select>
<select id="family"><option value="">All families</option><option>tee</option><option>crewneck</option><option>hoodie</option><option>mug</option><option>tote</option></select>
<button onclick="post('/actions/seed',{collection:val('collection'),family:val('family')})">Seed Launch Plan</button>
<button onclick="post('/actions/assets',{})">Generate Placeholder Assets</button>
<button onclick="post('/actions/approve',{})">Bulk Approve Ready Rows</button>
<button onclick="post('/actions/reject',{})">Reject Ready/Approved Rows</button>
<button onclick="post('/actions/publish',{})">Publish Approved</button>
<button onclick="post('/actions/export',{})">Export Launch Report</button>
</div>
<pre id="result"></pre>
<div class="wrap"><table id="t"></table></div>
<script>
const cols=['id','status','collection_slug','product_family','listing_title','publish_mode','personalization_mode','enabled_sizes_json','enabled_colors_json','printify_product_id','asset_local_path'];
function val(id){return document.getElementById(id).value}
async function post(url,data){const body=new URLSearchParams(data);const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});document.getElementById('result').textContent=JSON.stringify(await r.json(),null,2);load();}
async function load(){const q=await fetch('/api/queue').then(r=>r.json());const t=document.getElementById('t');if(!q.length){t.innerHTML='<tr><td>No rows yet.</td></tr>';return;}t.innerHTML='<tr>'+cols.map(c=>`<th>${c}</th>`).join('')+'</tr>'+q.map(r=>'<tr>'+cols.map(c=>`<td>${(r[c]||'').toString().slice(0,100)}</td>`).join('')+'</tr>').join('')}
load();
</script>
</body></html>
