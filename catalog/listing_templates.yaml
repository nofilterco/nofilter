listing_templates:
  - slug: milestones-est-template
    collection_slug: family-milestones
    status: ready
    product_profile_id: adult_tee_g5000
    style_pack: family-milestones
    preferred_layouts: [stacked_text, minimal_block, monogram_frame]
    supports_photo_upload: false
    supports_logo_upload: true
    supports_text_edit: true
    buyer_visible_field_labels: {established_year: "Established Year", family_name: "Family Name", crest_logo: "Optional Family Crest Logo"}
    max_text_lengths: {family_name: 24, established_year: 4}
    contrast_mode: auto
    product_safe_area: {tee: {x: 0.16, y: 0.18, w: 0.68, h: 0.58}, hoodie: {x: 0.15, y: 0.20, w: 0.70, h: 0.55}, crewneck: {x: 0.15, y: 0.19, w: 0.70, h: 0.56}}
    seo_keywords: [family milestone shirt, established year gift, custom family apparel]
    description_bullets: ["Premium print with durable detail", "Personalized text reviewed before production", "Gift-ready for milestone announcements"]
    title_template: "{{role}} Est. Personalized {{product_type}}"
    seo_title_template: "{{role}} Est. Personalized Gift | Crafted Occasion"
    description_template: "<p>Celebrate a family milestone with a personalized {{product_type}}.</p>"
    tags: [crafted-occasion, personalized, family-milestones]
    personalization_fields:
      - {field_key: established_year, field_label: "Established Year", field_type: date, required: true, placeholder: "YYYY"}
      - {field_key: family_name, field_label: "Family Name", field_type: text, max_length: 24, required: true, placeholder: "Smith"}
    image_upload_fields: []
    logo_upload_fields:
      - {field_key: crest_logo, field_label: "Family Crest Logo", file_types: [png, jpg], required: false}
    text_fields:
      - {field_key: family_name, field_label: "Family Name", required: true}
      - {field_key: established_year, field_label: "Established Year", required: true}
    personalization_instructions: "Collect name/year in Shopify personalization and confirm spelling before fulfillment."
    art_strategy: minimal_block
    default_art_placeholder_text: "Family Name\nEst. YYYY"
    publish_mode: personalized
    shopify_collection_tags: [collection-family-milestones]
    merchandising_keywords: [personalized gift, family milestone]

